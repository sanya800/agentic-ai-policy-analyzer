<!DOCTYPE html>
<html>
<head>
<title>Agentic AI Policy Analyzer</title>

<style>

body{
font-family: Arial;
background: linear-gradient(135deg,#667eea,#764ba2);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.container{
background:white;
padding:30px;
border-radius:12px;
width:500px;
box-shadow:0px 8px 20px rgba(0,0,0,0.2);
text-align:center;
}

h1{
color:#333;
}

.upload{
margin:20px 0;
}

button{
background:#667eea;
color:white;
border:none;
padding:10px 20px;
border-radius:6px;
cursor:pointer;
font-size:16px;
}

button:hover{
background:#5a67d8;
}

.result{
margin-top:20px;
padding:15px;
background:#f4f6ff;
border-radius:8px;
}

.label{
font-weight:bold;
color:#444;
}

</style>

</head>

<body>

<div class="container">

<h1>Agentic AI Policy Analyzer</h1>

<form method="POST" enctype="multipart/form-data" class="upload">

<input type="file" name="file" required>
<br><br>

<button type="submit">Analyze Document</button>

</form>

{% if result %}

<div class="result">

<p><span class="label">Uploaded File:</span> {{filename}}</p>

<p><span class="label">Result:</span> {{result}}</p>

<p><span class="label">Word Count:</span> {{word_count}}</p>

<p><span class="label">Risk Score:</span> {{risk_score}}%</p>

<p><span class="label">Summary:</span> {{summary}}</p>

</div>

{% endif %}

</div>

</body>
</html>
